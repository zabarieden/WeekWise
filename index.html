<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySevenDays: Smart Calendar</title>
    <link rel="stylesheet" href="theme.css?v=23">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="phone-wrapper">
        <div class="ambient-glow glow-pink"></div>
        <div class="ambient-glow glow-purple"></div>

        <div id="login-overlay" class="login-overlay">
            <div class="login-card">
                <h2>⚡ MySevenDays</h2>
                <p>Smart Calendar</p>
                <input type="email" id="email-input" placeholder="אימייל" class="auth-input">
                <input type="password" id="password-input" placeholder="סיסמה" class="auth-input">
                <button id="btn-login" class="btn-primary" style="width: 100%; margin-bottom: 8px;">התחברות</button>
                <button id="btn-signup" class="btn-secondary" style="width: 100%; margin-bottom: 8px;">הרשמה</button>
                <button id="btn-forgot-password" class="btn-secondary" style="width: 100%; font-size: 0.7rem;">שכחתי סיסמה</button>
            </div>
        </div>

        <div id="app-container" style="display: none; width: 100%; height: 100%; position: relative; z-index: 5; flex-direction: column;">
            <div class="dashboard-grid" style="margin-top: 10px;">
                <div class="nav-cube active" data-target="schedule-section"><span class="cube-icon">🗓️</span><span class="cube-title">לו"ז</span></div>
                <div class="nav-cube" data-target="nutrition-section"><span class="cube-icon">🍎</span><span class="cube-title">תזונה</span></div>
                <div class="nav-cube" data-target="my-center-section"><span class="cube-icon">✨</span><span class="cube-title">מטרות</span></div>
            </div>

            <div class="main-scroll-area">
                <section class="tab-content active-tab" id="schedule-section">
                    <div class="card">
                        <div class="card-title-row"><h2>MySevenDays</h2><button class="btn-floating-add" onclick="openModal('modal-add-task')">＋</button></div>
                        <div class="schedule-accordion" id="accordion-container"></div>
                        <button id="btn-clear-entire-week" class="btn-clear-week" style="margin-top: 20px;">ניקוי כל הלו"ז</button>
                    </div>
                </section>

                <section class="tab-content" id="nutrition-section">
                    <div class="card ai-card" style="border: 1px solid rgba(168, 85, 247, 0.35); background: rgba(25, 18, 38, 0.45);">
                        <h2 style="font-size: 0.95rem; color: var(--accent-purple-light); margin-bottom: 8px;">🤖 AI Nutrition Assistant</h2>
                        <div class="ai-input-wrapper">
                            <input type="text" id="ai-nutrition-prompt" placeholder="דוגמה: תוסיף 50 גרם פופקורן לנשנוש 1" class="auth-input" style="margin:0;">
                            <button id="btn-run-ai" class="btn-primary" style="width: auto; padding: 10px 15px;">עדכן ✨</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title-row"><h2>יומן ארוחות</h2><button class="btn-floating-add" onclick="openModal('modal-add-preset')">＋</button></div>
                        <input type="date" id="selected-date" class="auth-input" style="margin-bottom: 10px;">
                        <button id="btn-copy-yesterday" class="btn-secondary" style="width: 100%; margin-bottom: 10px;">שכפל מאתמול</button>
                        <div class="meals-container" id="meals-list"></div>
                        <button id="btn-save-nutrition" class="btn-primary" style="margin-top: 15px; width: 100%;">שמור תפריט</button>
                    </div>
                </section>

                <section class="tab-content" id="my-center-section">
                    <div class="my-center-grid">
                        <div class="card important-card"><h2>דברים חשובים</h2><ul id="important-list" class="center-list"></ul></div>
                        <div class="card"><h2>משימות</h2><ul id="weekly-list" class="center-list"></ul></div>
                        <div class="card"><h2>יעדי התקדמות</h2><div id="progress-container" class="progress-container"></div></div>
                    </div>
                </section>

                <div style="text-align: center; margin: 25px 0 10px 0;"><button id="btn-logout" class="btn-logout">🚪 התנתקות</button></div>
                <div style="text-align: center; font-size: 0.55rem; color: var(--text-secondary); opacity: 0.4; padding-bottom: 25px;">© 2026 all rights reserved. app developed by eden zabari.</div>
            </div>
        </div>
    </div>
    <script src="app.js?v=23"></script>
</body>
</html>
